name: Build and Push to GHCR

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/finchat
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker-compose.yml
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify server (webhook)
        if: github.event_name == 'push'
        run: |
          echo "Triggering rebuild on server..."
          # Server will pull and restart
          curl -s -X POST "http://43.156.24.50:9000/hooks/deploy-finchat" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -d '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}' \
            || echo "Server notification skipped"